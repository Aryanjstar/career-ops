<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Border accent -->
  <rect x="2" y="2" width="1196" height="626" rx="12" stroke="#2563eb" stroke-width="3" fill="none"/>
  
  <!-- Left side: Logo + Title -->
  <g transform="translate(80, 180)">
    <!-- Large briefcase icon -->
    <rect x="0" y="30" width="80" height="55" rx="10" fill="#2563eb"/>
    <path d="M24 30V22a10 10 0 0 1 10-10h12a10 10 0 0 1 10 10v8" stroke="#2563eb" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="40" cy="55" r="12" fill="#0a0a0a"/>
    <circle cx="40" cy="55" r="6" fill="#3b82f6"/>
    <path d="M36 52l3-5h5l-3 4.5h4l-7 8 1.5-5.5h-3.5z" fill="#fbbf24"/>
    
    <!-- Title text -->
    <text x="100" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#ffffff">career-ops</text>
    <text x="100" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">AI-Powered Job Search Automation</text>
  </g>
  
  <!-- Feature pills -->
  <g transform="translate(80, 340)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#1e3a5f"/>
    <text x="90" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">Auto Apply</text>
    
    <rect x="200" y="0" width="200" height="40" rx="20" fill="#1e3a5f"/>
    <text x="300" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">Resume Tailoring</text>
    
    <rect x="420" y="0" width="200" height="40" rx="20" fill="#1e3a5f"/>
    <text x="520" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">Interview Prep</text>
    
    <rect x="640" y="0" width="180" height="40" rx="20" fill="#1e3a5f"/>
    <text x="730" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#60a5fa">Cold Emails</text>
  </g>
  
  <!-- Right side stats -->
  <g transform="translate(80, 420)">
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">Scans 150+ companies every 6 hours</text>
    <text x="0" y="60" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">Greenhouse  |  Lever  |  Ashby  |  LinkedIn  |  Naukri  |  Indeed</text>
  </g>
  
  <!-- Bottom right: tech stack -->
  <g transform="translate(830, 530)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#475569">Node.js + Azure OpenAI + Playwright + Next.js</text>
  </g>
</svg>
